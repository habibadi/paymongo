name: SDET Quality Gate (AI-Driven Testing)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run AI Test Generator & Executions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────
      # STEP 1: Install Node.js dependencies for API Test Generator
      # ─────────────────────────────────────────────
      - name: Install API Generator Dependencies
        working-directory: ./application_code
        run: npm install

      # ─────────────────────────────────────────────
      # STEP 2: Run API Test Generator with Gemini
      # Reads docs/swagger.json, generates spec files into generated_test/tests/api/
      # ─────────────────────────────────────────────
      - name: Generate API Tests from Swagger (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: ./application_code
        run: node scripts/generate-tests.js

      # ─────────────────────────────────────────────
      # STEP 3: Start API & UI services in the background
      # ─────────────────────────────────────────────
      - name: Start API & UI Services (Background)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: ./application_code
        run: |
          docker compose up -d --build api ui
          echo "Waiting for services to be healthy..."
          sleep 30

      # ─────────────────────────────────────────────
      # STEP 4: Run Browser-Use AI UI Test Generator
      # Explores UI, generates spec files into generated_test/tests/web/
      # ─────────────────────────────────────────────
      - name: Generate UI Tests (Browser-Use AI Agent)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: ./application_code
        run: |
          docker compose run --rm test-generator

      # ─────────────────────────────────────────────
      # STEP 5: Run Playwright Tests (API + Web)
      # If any test fails, this step fails → PR blocked!
      # ─────────────────────────────────────────────
      - name: Run Playwright Quality Gate
        working-directory: ./application_code
        run: |
          docker compose run --rm tester

      # ─────────────────────────────────────────────
      # STEP 6: Upload Playwright Report Artifact
      # Available even if tests fail
      # ─────────────────────────────────────────────
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./application_code/generated_test/playwright-report/
          retention-days: 7
