name: SDET Quality Gate (AI-Driven Testing)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run AI Test Generator & Executions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setting up Node & Go might not be strictly necessary because Docker handles it,
      # but it's good practice if any local pre-commit/lints need to run later.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E & API Quality Gate via Docker Compose
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: ./application_code
        # docker-compose up --abort-on-container-exit will automatically stop 
        # all containers when one stops. The exit code of the compose command 
        # is the exit code of the primary container (which usually stops first, meaning 'tester').
        # If 'tester' fails asserting, this step will fail, failing the PR!
        run: |
          # Mulai services api & ui di background
          docker compose up -d api ui
          
          # Jalankan AI Test Generator
          docker compose run --rm test-generator
          
          # Jalankan Playwright Test Executor (Exit code akan di-pass ke GitHub Actions)
          docker compose run --rm tester
      
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./application_code/generated_test/playwright-report/
          retention-days: 7
