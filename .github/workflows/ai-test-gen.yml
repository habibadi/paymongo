name: AI Test Generation & CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ai-generate-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. CHECKOUT ──────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. NODE.JS SETUP ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application_code/package-lock.json

      # ── 3. INSTALL GENERATOR DEPENDENCIES ───────────────────────────────────
      - name: Install Generator Dependencies
        run: |
          cd application_code
          npm install

      # ── 4. CACHE: Restore previously generated test hashes ──────────────────
      - name: Restore Test Generation Cache
        uses: actions/cache@v4
        with:
          path: .cache/
          key: test-gen-cache-${{ hashFiles('application_code/docs/swagger.json', 'application_code/app/page.tsx') }}
          restore-keys: |
            test-gen-cache-

      # ── 5. AI: Generate API Tests (Real — uses Swagger diff + Gemini) ────────
      - name: Generate API Tests (AI-Powered)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🧠 Running AI API Test Generator..."
          cd application_code
          node scripts/generate-tests.js
          echo "✅ API test generation complete."
          echo "Generated files:"
          ls -la generated_test/tests/api/ 2>/dev/null || echo "No API tests generated (no changes detected)"

      # ── 6. AI: Generate UI/E2E Tests (Real — uses page.tsx hash + Gemini) ────
      # Note: UI server not yet running at this step, generator falls back to
      # static page.tsx analysis automatically (by design).
      - name: Generate UI E2E Tests (AI-Powered)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🎭 Running AI UI/E2E Test Generator..."
          cd application_code
          node scripts/generate-ui-tests.js
          echo "✅ UI test generation complete."
          echo "Generated files:"
          ls -la generated_test/tests/web/ 2>/dev/null || echo "No UI tests generated (no changes detected)"

      # ── 7. SYNC: Copy generated tests into playwright_template ───────────────
      # The Docker tester container reads from application_code/generated_test,
      # but the playwright_template project also needs the generated tests
      # in case tests/api/generated is configured as the source.
      - name: Sync Generated Tests to Playwright Template
        run: |
          echo "🔄 Syncing generated tests..."
          mkdir -p playwright_template/tests/api/generated
          mkdir -p playwright_template/tests/web/generated

          # Sync API tests
          if [ -d "application_code/generated_test/tests/api" ] && [ "$(ls -A application_code/generated_test/tests/api 2>/dev/null)" ]; then
            cp application_code/generated_test/tests/api/*.spec.ts playwright_template/tests/api/generated/ 2>/dev/null || true
            echo "  ✅ API tests synced: $(ls playwright_template/tests/api/generated/*.spec.ts 2>/dev/null | wc -l) files"
          else
            echo "  ℹ️  No new API test files to sync"
          fi

          # Sync UI tests
          if [ -d "application_code/generated_test/tests/web" ] && [ "$(ls -A application_code/generated_test/tests/web 2>/dev/null)" ]; then
            cp application_code/generated_test/tests/web/*.spec.ts playwright_template/tests/web/generated/ 2>/dev/null || true
            echo "  ✅ UI tests synced: $(ls playwright_template/tests/web/generated/*.spec.ts 2>/dev/null | wc -l) files"
          else
            echo "  ℹ️  No new UI test files to sync"
          fi

      # ── 8. DOCKER: Build & Run Full Test Suite ───────────────────────────────
      # Docker Compose brings up:
      #   - api:    Go backend on :8080
      #   - ui:     Next.js frontend on :3000
      #   - tester: Playwright test runner (waits for api+ui to be healthy)
      # The generated_test volume maps ./application_code/generated_test into
      # the tester container at /test-runner/generated_test.
      - name: Build & Run Tests via Docker Compose
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🐳 Starting Docker Compose test run..."
          docker compose up --build --exit-code-from tester
          echo "✅ Docker test run complete."

      # ── 9. UPLOAD: Playwright HTML Report ────────────────────────────────────
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: application_code/generated_test/playwright-report/
          retention-days: 14

      # ── 10. UPLOAD: JUnit XML for CI Insights ────────────────────────────────
      - name: Upload JUnit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-${{ github.run_number }}
          path: application_code/generated_test/test-results/results.xml
          retention-days: 14

      # ── 11. UPLOAD: AI-Generated Test Source Files ────────────────────────────
      - name: Upload Generated Test Sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests-${{ github.run_number }}
          path: |
            application_code/generated_test/tests/
          retention-days: 14

      # ── 12. NOTIFY: Discord Webhook ───────────────────────────────────────────
      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK is not set, skipping notification."
            exit 0
          fi

          # 1. Count generated test files
          API_COUNT=$(ls application_code/generated_test/tests/api/*.spec.ts 2>/dev/null | wc -l | tr -d ' ')
          UI_COUNT=$(ls application_code/generated_test/tests/web/*.spec.ts 2>/dev/null | wc -l | tr -d ' ')
          GEN_TEXT="🤖 **Generated**: $API_COUNT API tests | $UI_COUNT UI tests"

          # 2. Parse Test Stats from JUnit XML
          XML_PATH="application_code/generated_test/test-results/results.xml"
          if [ -f "$XML_PATH" ]; then
            TOTAL=$(grep -oP 'tests="\K[^"]+' "$XML_PATH" | head -1 || echo "0")
            FAILURES=$(grep -oP 'failures="\K[^"]+' "$XML_PATH" | head -1 || echo "0")
            ERRORS=$(grep -oP 'errors="\K[^"]+' "$XML_PATH" | head -1 || echo "0")
            FAILED_COUNT=$((FAILURES + ERRORS))
            PASSED_COUNT=$((TOTAL - FAILED_COUNT))
            STATS_TEXT="📊 **Stats**: Total $TOTAL | ✅ Pass $PASSED_COUNT | ❌ Fail $FAILED_COUNT"
          else
            STATS_TEXT="📊 **Stats**: Report not found"
          fi

          # 3. Zip the Playwright Report
          REPORT_ZIP="playwright-report.zip"
          REPORT_DIR="application_code/generated_test/playwright-report"
          if [ -d "$REPORT_DIR" ]; then
            zip -r "$REPORT_ZIP" "$REPORT_DIR"
          fi

          # 4. Prepare Discord Payload
          STATUS="${{ job.status }}"
          COLOR="65280"        # Green
          EMOJI="✅"
          if [ "$STATUS" = "failure" ]; then
            COLOR="16711680"   # Red
            EMOJI="❌"
          elif [ "$STATUS" = "cancelled" ]; then
            COLOR="16776960"   # Yellow
            EMOJI="⚠️"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "$EMOJI CI/CD Status: $STATUS",
              "color": $COLOR,
              "description": "$GEN_TEXT\n$STATS_TEXT",
              "fields": [
                { "name": "Repository", "value": "${{ github.repository }}", "inline": true },
                { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                { "name": "Triggered By", "value": "${{ github.actor }}", "inline": true },
                { "name": "Commit", "value": "${{ github.event.head_commit.message }}", "inline": false },
                { "name": "Action Run", "value": "[View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
              ],
              "footer": { "text": "AI-Powered SDET Pipeline • Powered by Gemini" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )

          # 5. Send to Discord (multipart with zip if available)
          if [ -f "$REPORT_ZIP" ]; then
            curl -s -X POST \
              -H "Content-Type: multipart/form-data" \
              -F "payload_json=$PAYLOAD" \
              -F "file=@$REPORT_ZIP" \
              "$DISCORD_WEBHOOK"
          else
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$DISCORD_WEBHOOK"
          fi
