name: AI Test Generation & CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-generation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies for Generator
        run: |
          cd application_code
          npm install

      - name: Run AI Test Generator (Mocked)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node application_code/scripts/generate-tests.js

      - name: Build and Run Tests via Docker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Use docker compose to orchestrate the entire environment
          # The --exit-code-from tester ensures the job fails if a test fails
          docker compose up --build --exit-code-from tester

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: application_code/generated_test/playwright-report/
          retention-days: 7

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK is not set, skipping notification."
            exit 0
          fi
          
          STATUS="${{ job.status }}"
          COLOR="65280" # Green for Success
          if [ "$STATUS" = "failure" ]; then COLOR="16711680"; fi # Red for Failure
          if [ "$STATUS" = "cancelled" ]; then COLOR="8421504"; fi # Gray for Cancelled
          
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "🚀 CI/CD Status: $STATUS",
              "color": $COLOR,
              "fields": [
                { "name": "Repository", "value": "${{ github.repository }}", "inline": true },
                { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                { "name": "Commit", "value": "${{ github.event.head_commit.message }}", "inline": false },
                { "name": "Action Run", "value": "[View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
              ],
              "footer": { "text": "AI Test Generation Pipeline" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK"
